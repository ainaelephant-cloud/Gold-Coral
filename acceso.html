<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title translate="no">Acceso · Gold Coral</title>
    <meta name="description" content="Área privada de Gold Coral">
    <meta name="theme-color" content="#0b0b0b">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/jpeg" href="img/favicon.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/area.css">
</head>
<body class="auth-body">
    <main class="auth-card">
        <a href="index.html" class="auth-brand" aria-label="Gold Coral">
            <img src="img/logo.png" alt="Gold Coral">
        </a>

        <span class="eyebrow">Área privada</span>
        <h1>Acceso</h1>
        <p class="auth-sub">Introduce tu correo y contraseña para acceder a los ficheros compartidos del equipo.</p>

        <form id="login-form" autocomplete="on">
            <div class="field">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" required autocomplete="username" placeholder="nombre@goldcoral.vip">
            </div>
            <div class="field">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
            </div>
            <button type="submit" class="auth-btn" id="login-btn">
                Entrar
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
            </button>
            <div class="auth-msg" id="msg"></div>
        </form>

        <div class="auth-foot">
            <a href="index.html">← Volver a la web</a>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts/supabase-config.js"></script>
    <script>
        (function () {
            var sb = window.goldcoralClient();
            var form = document.getElementById("login-form");
            var btn = document.getElementById("login-btn");
            var msg = document.getElementById("msg");

            function showMsg(text, type) {
                msg.textContent = text;
                msg.className = "auth-msg show " + type;
            }

            // Si ya hay sesión activa, ir directamente al área
            sb.auth.getSession().then(function (res) {
                if (res.data.session) { window.location.replace("area.html"); }
            });

            form.addEventListener("submit", async function (e) {
                e.preventDefault();
                msg.className = "auth-msg";
                btn.disabled = true;
                var prev = btn.innerHTML;
                btn.textContent = "Comprobando…";

                var email = document.getElementById("email").value.trim();
                var password = document.getElementById("password").value;

                try {
                    var out = await sb.auth.signInWithPassword({ email: email, password: password });
                    if (out.error) {
                        showMsg("Correo o contraseña incorrectos. Revísalos e inténtalo de nuevo.", "error");
                        btn.disabled = false;
                        btn.innerHTML = prev;
                        return;
                    }
                    showMsg("Acceso correcto. Entrando…", "info");
                    window.location.replace("area.html");
                } catch (err) {
                    showMsg("No se ha podido conectar. Comprueba tu conexión e inténtalo de nuevo.", "error");
                    btn.disabled = false;
                    btn.innerHTML = prev;
                }
            });
        })();
    </script>
</body>
</html>
